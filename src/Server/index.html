<!-- The Button -->
<button id="post-btn">Send JSON Data</button>

<script>
  document.getElementById('post-btn').addEventListener('click', async () => {
    // 1. Prepare your data
    const data = { 
      command: "screenshot"
    };

    try {
      // 2. Send the POST request
      const response = await fetch('https://localhost:4444', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json' // Tells server we are sending JSON
        },
        body: JSON.stringify(data) // Converts object to JSON string
      });

       // 3. Handle the response
        if (response.ok) {
            const result = await response.json();
            console.log('Success:', result);
        } else {
            console.error('Submission failed with status:', response.status);
        }
    } catch (error) {
        console.error('Error:', error);
    }
});

</script>
